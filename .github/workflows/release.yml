name: Release
on:
  push:
    tags:
      - 'v*'
permissions:
  contents: write
jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Validate required files (FR-057)
        run: |
          # Validate src/ directory structure
          [ -d "src/.github/agents" ] && [ "$(ls -A src/.github/agents)" ] \
            || { echo "MISSING or empty: src/.github/agents/"; exit 1; }
          [ -d "src/.github/workflows" ] && [ "$(ls -A src/.github/workflows)" ] \
            || { echo "MISSING or empty: src/.github/workflows/"; exit 1; }
          [ -f "src/.github/copilot/instructions.md" ] \
            || { echo "MISSING: src/.github/copilot/instructions.md"; exit 1; }

          # Validate specific required agent and workflow files
          # Note: .lock.yml files are not shipped — users compile them after installation
          for f in \
            "src/.github/workflows/triage.md" \
            "src/.github/workflows/research.md" \
            "src/.github/workflows/spec.md" \
            "src/.github/workflows/plan.md" \
            "src/.github/workflows/tasks.md" \
            "src/.github/workflows/refine.md" \
            "src/.github/actions/assign-pr-agent/action.yml" \
            "src/.github/agents/agentic-flow-spec.agent.md" \
            "src/.github/agents/agentic-flow-plan.agent.md" \
            "src/.github/agents/agentic-flow-tasks.agent.md" \
            "src/.github/workflows/triage-trigger.yml" \
            "src/.github/workflows/post-merge-trigger.yml" \
            "src/.github/workflows/post-merge.md" \
            "src/.github/workflows/research-trigger.yml"; do
            [ -f "$f" ] || { echo "MISSING: $f"; exit 1; }
          done

          # Validate docs/ (only files shipped in the release zip)
          for f in "docs/README.md" "docs/init.md" "docs/usage.md"; do
            [ -f "$f" ] || { echo "MISSING: $f"; exit 1; }
          done

      - name: Validate shipped workflow sources compile
        run: |
          gh extension install github/gh-agentic-workflows
          gh aw compile --actionlint src/.github/workflows/*.md

      - name: Package zip (FR-058, FR-059a)
        run: |
          VERSION="${GITHUB_REF_NAME}"
          # Package src/ contents — users extract this at their repo root (src/ prefix is stripped)
          # or run: cp -r src/. /target-repo/
          # Exclude .lock.yml files — users compile their own after installation
          cd src && zip -r "../agentic-flow-${VERSION}.zip" . --exclude "*.lock.yml" && cd ..
          # Append adopter docs — only README.md, init.md, usage.md ship in the zip
          # docs/contributing.md is dev-only and excluded
          zip -r "agentic-flow-${VERSION}.zip" \
            docs/README.md \
            docs/init.md \
            docs/usage.md

      - name: Generate upgrading notes (FR-061a)
        id: upgrading
        run: |
          PREV=$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || echo "")
          if [ -n "$PREV" ]; then
            CHANGED=$(git diff --name-only "$PREV".."$GITHUB_REF_NAME" | grep -E '^src/|^docs/' || true)
            echo "notes<<EOF" >> $GITHUB_OUTPUT
            echo "## Upgrading from ${PREV}" >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            echo "Changed framework files:" >> $GITHUB_OUTPUT
            echo "$CHANGED" | sed 's/^/- /' >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release (FR-061)
        uses: softprops/action-gh-release@v2
        with:
          files: agentic-flow-*.zip
          generate_release_notes: true
          body: ${{ steps.upgrading.outputs.notes }}
