name: 'Assign PR to Agentic-Flow Agent'
description: >-
  Composite action that assigns a spec PR to the Copilot coding agent via the
  manual workaround for the gh aw built-in PR-target assignment bug. Centralises
  the ~330-line inline block previously duplicated verbatim across plan.md,
  refine.md, and tasks.md.

inputs:
  stage-name:
    description: >-
      Pipeline stage name: plan | refine | tasks | implement | audit.
    required: true
  agent-name:
    description: >-
      Custom agent identifier to pass to replaceActorsForAssignable.
      Values: agentic-flow-plan | agentic-flow-spec | agentic-flow-tasks
    required: true
  context-source:
    description: >-
      How to resolve context: safe-output (default, reads GH_AW_AGENT_OUTPUT)
      or direct (all values provided via inputs below).
    required: false
    default: 'safe-output'
  pull-number:
    description: >-
      PR number string. In direct mode, this is the task/feature PR number.
      In safe-output mode, this falls back to context.issue.number if empty.
    required: false
  agent-token:
    description: 'GH_AW_AGENT_TOKEN secret (PAT with repo + copilot scopes).'
    required: true
  speckit-phase-agent:
    description: >-
      Path to the speckit phase agent file, e.g.
      .github/agents/speckit.plan.agent.md.
      Required for plan/refine/tasks stages. Leave empty for implement/audit.
    required: false
  feature-issue-number:
    description: 'Feature issue number (direct mode only).'
    required: false
  spec-directory:
    description: 'Spec directory, e.g. specs/001-my-feature (direct mode only).'
    required: false
  task-issue-number:
    description: 'Task or audit issue number (direct mode only).'
    required: false
  feature-pr-number:
    description: 'Feature PR number (direct mode, implement, review, and review-fix stages).'
    required: false

outputs:
  startup-comment-id:
    description: 'GitHub comment ID of the startup comment posted on the spec PR.'
    value: ${{ steps.assign.outputs.startup-comment-id }}

runs:
  using: composite
  steps:
    - name: Assign Copilot to spec PR
      id: assign
      uses: actions/github-script@v8
      env:
        GH_AW_AGENT_TOKEN: ${{ inputs.agent-token }}
        STAGE_NAME: ${{ inputs.stage-name }}
        AGENT_NAME: ${{ inputs.agent-name }}
        PULL_NUMBER: ${{ inputs.pull-number }}
        SPECKIT_PHASE_AGENT: ${{ inputs.speckit-phase-agent }}
        CONTEXT_SOURCE: ${{ inputs.context-source }}
        FEATURE_ISSUE_NUMBER_DIRECT: ${{ inputs.feature-issue-number }}
        SPEC_DIRECTORY_DIRECT: ${{ inputs.spec-directory }}
        TASK_ISSUE_NUMBER_DIRECT: ${{ inputs.task-issue-number }}
        FEATURE_PR_NUMBER_DIRECT: ${{ inputs.feature-pr-number }}
      with:
        github-token: ${{ inputs.agent-token }}
        script: |
          const script = require(`${process.env.GITHUB_WORKSPACE}/.github/actions/assign-pr-agent/main.js`);
          await script({ github, context, core });
