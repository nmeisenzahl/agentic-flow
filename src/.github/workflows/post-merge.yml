name: Create Task Issues (agentic-flow)
on:
  pull_request:
    types: [closed]
    branches:
      - main
    # branches: filter matches base branch; head branch pattern-match is in the if: guard and meta step below
permissions:
  issues: write
  contents: read
concurrency:
  group: post-merge-${{ github.event.pull_request.number }}
  cancel-in-progress: false
jobs:
  create-tasks:
    if: >-
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.labels.*.name, 'ready-to-merge')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Extract feature issue + spec directory from PR context
        id: meta
        env:
          MERGE_SHA_VAL: ${{ github.event.pull_request.merge_commit_sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "merge_sha=$MERGE_SHA_VAL" >> $GITHUB_OUTPUT
          COMMENTS_JSON=$(gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments?per_page=100")
          COMMENTS_JSON="$COMMENTS_JSON" python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os
          import re
          import sys

          comments = json.loads(os.environ["COMMENTS_JSON"])
          for comment in reversed(comments):
            body = comment.get("body") or ""
            if "<!-- agentic-flow-context" not in body:
              continue
            feature = re.search(r"Feature issue:\s*#?(\d+)", body)
            spec_dir = re.search(r"Spec directory:\s*(specs/[^\s]+)", body)
            if feature and spec_dir:
              print(f"issue_number={feature.group(1)}")
              print(f"spec_dir={spec_dir.group(1)}")
              sys.exit(0)

          print("ERROR: Could not find an agentic-flow-context block with Feature issue and Spec directory in PR comments.", file=sys.stderr)
          sys.exit(1)
          PY

      - name: Install js-yaml
        run: npm install js-yaml@4.1.0 --save-exact
        # js-yaml is not available in the github-script runtime by default — must be installed before the github-script step that calls require('js-yaml').

      - name: Parse tasks.md and create Task issues
        uses: actions/github-script@v8
        env:
          MERGE_SHA: ${{ steps.meta.outputs.merge_sha }}
          ISSUE_NUMBER: ${{ steps.meta.outputs.issue_number }}
          SPEC_DIR: ${{ steps.meta.outputs.spec_dir }}
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('fs');
            const yaml = require('js-yaml');

            // Read tasks.md
            const tasksContent = fs.readFileSync(`${process.env.SPEC_DIR}/tasks.md`, 'utf8');
            // Parse YAML — tasks.md has top-level `dependency_graph:` + `tasks:` keys
            let parsed;
            try {
              parsed = yaml.load(tasksContent);
            } catch (e) {
              core.setFailed(`Failed to parse tasks.md as YAML: ${e.message}`);
              return;
            }
            if (!parsed || typeof parsed !== 'object') {
              core.setFailed('tasks.md parsed to null or non-object — file may be empty or malformed');
              return;
            }
            const tasks = parsed.tasks || parsed;

            // Guard: empty task list produces a warning comment and soft-fails
            if (!Array.isArray(tasks) || tasks.length === 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: parseInt(process.env.ISSUE_NUMBER),
                body: '⚠️ **Post-merge warning**: `tasks.md` contains no task entries. No Task issues were created. Please verify that `tasks.md` is correctly formatted and re-run if needed.'
              });
              core.warning('tasks.md contains no tasks — skipping issue creation');
              return;
            }

            // Validate full task list shape before any side effects
            const invalid = tasks.filter((t, i) => {
              if (!t || typeof t !== 'object') return true;
              if (!t.title || typeof t.title !== 'string' || !t.title.trim()) return true;
              if (!t.description || typeof t.description !== 'string') return true;
              if (t.labels !== undefined && !Array.isArray(t.labels)) return true;
              return false;
            });
            if (invalid.length > 0) {
              const indices = invalid.map(t => tasks.indexOf(t));
              core.setFailed(`tasks.md schema validation failed: ${invalid.length} malformed task(s) at indices [${indices.join(', ')}]. Each task requires non-empty string title, string description. No side effects were applied.`);
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const mergeSha = process.env.MERGE_SHA;
            const specDir = process.env.SPEC_DIR;
            const featureIssueNum = parseInt(process.env.ISSUE_NUMBER);

            const specBase = `https://github.com/${owner}/${repo}/blob/${mergeSha}`;
            const specLinks = [
              `[spec.md](${specBase}/${specDir}/spec.md)`,
              `[plan.md](${specBase}/${specDir}/plan.md)`,
              `[tasks.md](${specBase}/${specDir}/tasks.md)`
            ].join('\n- ');

            const failures = [];

            for (const task of tasks) {
              // Idempotency: check if Task issue already exists for THIS feature
              // Use a hidden HTML comment marker: <!-- agentic-flow:feature={N}:task={taskId} -->
              const taskId = task.id || task.title.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
              const marker = `<!-- agentic-flow:feature=${featureIssueNum}:task=${taskId} -->`;
              const search = await github.rest.search.issuesAndPullRequests({
                q: `repo:${owner}/${repo} type:issue in:body "${marker}"`
              });
              const existing = search.data.items.find(i => i.body && i.body.includes(marker));
              if (existing) {
                console.log(`Task already exists for feature #${featureIssueNum}: ${task.title} (#${existing.number})`);
                // Reconcile: ensure sub-issue link is current
                try {
                  await github.request('POST /repos/{owner}/{repo}/issues/{issue_number}/sub_issues', {
                    owner, repo, issue_number: featureIssueNum, sub_issue_id: existing.id
                  });
                } catch (e) { console.log(`Sub-issue link already exists or failed: ${e.message}`); }
                continue;
              }

              // Create Task issue
              const body = `${marker}\n\n## ${task.title}\n\n${task.description}\n\n**Spec artefacts** (at merge commit ${mergeSha.slice(0,8)}):\n- ${specLinks}`;
              const created = await github.rest.issues.create({
                owner, repo,
                title: task.title,
                body,
                labels: task.labels || []
              });

              // Link as sub-issue (integer id, not node_id)
              try {
                await github.request('POST /repos/{owner}/{repo}/issues/{issue_number}/sub_issues', {
                  owner, repo,
                  issue_number: featureIssueNum,
                  sub_issue_id: created.data.id
                });
              } catch (e) {
                console.warn(`Sub-issue link failed for #${created.data.number}: ${e.message}`);
                failures.push(`Sub-issue link: #${created.data.number} (${e.message})`);
              }

              // Rate limit protection — scale delay for large task lists
              const delay = tasks.length > 20 ? 1000 : 500;
              await new Promise(r => setTimeout(r, delay));
            }

            // FR-036: Post plan summary comment on Feature issue
            const numTasks = tasks.length;
            const tasksUrl = `https://github.com/${owner}/${repo}/blob/${mergeSha}/${specDir}/tasks.md`;
            const failureSummary = failures.length > 0
              ? `\n\n⚠️ **${failures.length} non-fatal error(s)** occurred during issue linking/board placement:\n${failures.map(f => `- ${f}`).join('\n')}`
              : '';
            await github.rest.issues.createComment({
              owner, repo,
              issue_number: featureIssueNum,
              body: `## Plan Summary\n\n**Branch**: \`${specDir}\`  \n**Merge commit**: \`${mergeSha}\`  \n**Tasks created**: ${numTasks}  \n**Tasks file**: [tasks.md](${tasksUrl})\n\nSub-issues are linked above.${failureSummary}`
            });
