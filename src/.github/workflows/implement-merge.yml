name: Implement Merge (agentic-flow)
on:
  pull_request:
    types: [labeled]
  check_run:
    types: [completed]

permissions:
  contents: write
  issues: write
  pull-requests: write
  actions: write

concurrency:
  group: implement-merge-${{ github.event.pull_request.head.sha || github.event.check_run.head_sha }}
  cancel-in-progress: false

jobs:
  merge-task-pr:
    if: |
      (github.event_name == 'pull_request') ||
      (github.event_name == 'check_run' && startsWith(github.event.check_run.check_suite.head_branch, 'implement/'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      actions: write
    steps:
      - name: Resolve task PR and verify eligibility
        id: resolve
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GH_AW_AGENT_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo  = context.repo.repo;

            let taskPRNumber;

            if (context.eventName === 'pull_request') {
              // Fired when agent applies ready-to-merge-task label
              if (context.payload.label?.name !== 'ready-to-merge-task') {
                core.info('Not a ready-to-merge-task label event; skipping.');
                core.setOutput('skip', 'true');
                return;
              }
              taskPRNumber = context.payload.pull_request.number;
            } else if (context.eventName === 'check_run') {
              // Fired when CI completes — find associated PR with ready-to-merge-task label
              const prs = context.payload.check_run.pull_requests || [];
              if (prs.length === 0) {
                core.info('check_run has no associated PRs; skipping.');
                core.setOutput('skip', 'true');
                return;
              }
              for (const pr of prs) {
                const { data: prData } = await github.rest.pulls.get({ owner, repo, pull_number: pr.number });
                if (prData.labels?.some(l => l.name === 'ready-to-merge-task') && prData.state === 'open') {
                  taskPRNumber = pr.number;
                  break;
                }
              }
              if (!taskPRNumber) {
                core.info('No open PR with ready-to-merge-task found for this check_run; skipping.');
                core.setOutput('skip', 'true');
                return;
              }
            } else {
              core.setOutput('skip', 'true');
              return;
            }

            // Fetch full PR details
            const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number: taskPRNumber });

            if (pr.state !== 'open') {
              core.info(`PR #${taskPRNumber} is not open (state: ${pr.state}); skipping.`);
              core.setOutput('skip', 'true');
              return;
            }

            if (!pr.labels?.some(l => l.name === 'ready-to-merge-task')) {
              core.info(`PR #${taskPRNumber} does not have ready-to-merge-task label; skipping.`);
              core.setOutput('skip', 'true');
              return;
            }

            // Verify all CI checks pass
            const headSha = pr.head.sha;
            const { data: checkSuites } = await github.rest.checks.listSuitesForRef({
              owner, repo, ref: headSha,
            });
            const { data: checkRuns } = await github.rest.checks.listForRef({
              owner, repo, ref: headSha,
            });

            const runs = checkRuns.check_runs || [];
            const pending = runs.filter(r => r.status !== 'completed');
            const failed  = runs.filter(r => r.status === 'completed' && !['success', 'neutral', 'skipped'].includes(r.conclusion));

            if (pending.length > 0) {
              core.info(`${pending.length} check(s) still pending on PR #${taskPRNumber}; waiting.`);
              core.setOutput('skip', 'true');
              return;
            }

            if (failed.length > 0) {
              const failedNames = failed.map(r => r.name).join(', ');
              core.warning(`CI checks failed on PR #${taskPRNumber}: ${failedNames}`);
              // Post a failure comment so humans can see the issue
              await github.rest.issues.createComment({
                owner, repo, issue_number: taskPRNumber,
                body: [
                  '## ❌ Task PR — CI Failed',
                  '',
                  `The following checks failed: **${failedNames}**`,
                  '',
                  'The task PR cannot be auto-merged until all checks pass.',
                  '',
                  '_agentic-flow implementation pipeline_',
                ].join('\n'),
              });
              core.setOutput('skip', 'true');
              return;
            }

            // Extract context from PR body
            const body = pr.body || '';
            const featureIssueMatch = body.match(/\*\*Feature issue:\*\*\s*#(\d+)/);
            const featurePRMatch    = body.match(/\*\*Feature PR:\*\*\s*#(\d+)/);
            const taskIssueMatch    = body.match(/\*\*Task issue:\*\*\s*#(\d+)/);
            const specDirMatch      = body.match(/\*\*Spec directory:\*\*\s*`([^`]+)`/);

            if (!featureIssueMatch || !featurePRMatch || !taskIssueMatch || !specDirMatch) {
              core.setFailed(`Could not parse required context from PR #${taskPRNumber} body. Expected Feature issue, Feature PR, Task issue, Spec directory fields.`);
              return;
            }

            core.setOutput('skip',                 'false');
            core.setOutput('task_pr_number',       String(taskPRNumber));
            core.setOutput('feature_issue_number', featureIssueMatch[1]);
            core.setOutput('feature_pr_number',    featurePRMatch[1]);
            core.setOutput('task_issue_number',    taskIssueMatch[1]);
            core.setOutput('spec_directory',       specDirMatch[1]);
            core.setOutput('feature_branch',       pr.base.ref);
            core.setOutput('task_branch',          pr.head.ref);
            core.setOutput('head_sha',             pr.head.sha);

      - name: Merge task PR into feature branch
        id: merge
        if: steps.resolve.outputs.skip != 'true'
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GH_AW_AGENT_TOKEN }}
          script: |
            const owner        = context.repo.owner;
            const repo         = context.repo.repo;
            const taskPRNumber = Number('${{ steps.resolve.outputs.task_pr_number }}');
            const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number: taskPRNumber });

            // Idempotency: another concurrent run may have already merged this PR
            if (pr.state !== 'open') {
              core.info(`PR #${taskPRNumber} is already ${pr.state}; skipping merge.`);
              core.setOutput('merged', 'false');
              return;
            }

            const { data: merge } = await github.rest.pulls.merge({
              owner, repo,
              pull_number: taskPRNumber,
              merge_method: 'squash',
              commit_title: `${pr.title} (#${taskPRNumber})`,
              commit_message: `Auto-merged by agentic-flow implement-merge workflow.\n\nTask: #${{ steps.resolve.outputs.task_issue_number }}\nFeature: #${{ steps.resolve.outputs.feature_issue_number }}`,
            });

            core.info(`Merged task PR #${taskPRNumber}: ${merge.message}`);
            core.setOutput('merged', 'true');

      - name: Close task issue with summary
        if: steps.resolve.outputs.skip != 'true' && steps.merge.outputs.merged == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            const owner           = context.repo.owner;
            const repo            = context.repo.repo;
            const taskIssueNumber = Number('${{ steps.resolve.outputs.task_issue_number }}');
            const taskPRNumber    = Number('${{ steps.resolve.outputs.task_pr_number }}');
            const featureIssue    = '${{ steps.resolve.outputs.feature_issue_number }}';

            await github.rest.issues.createComment({
              owner, repo, issue_number: taskIssueNumber,
              body: [
                '## ✅ Task Implemented and Merged',
                '',
                `Task PR #${taskPRNumber} was auto-merged into the feature branch.`,
                '',
                `**Feature:** #${featureIssue}`,
                `**Task PR:** #${taskPRNumber}`,
                '',
                '_agentic-flow implementation pipeline_',
              ].join('\n'),
            });

            await github.rest.issues.update({
              owner, repo, issue_number: taskIssueNumber, state: 'closed',
            });

      - name: Update feature issue progress
        if: steps.resolve.outputs.skip != 'true' && steps.merge.outputs.merged == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            const owner              = context.repo.owner;
            const repo               = context.repo.repo;
            const featureIssueNumber = Number('${{ steps.resolve.outputs.feature_issue_number }}');
            const taskIssueNumber    = Number('${{ steps.resolve.outputs.task_issue_number }}');
            const taskPRNumber       = Number('${{ steps.resolve.outputs.task_pr_number }}');

            await github.rest.issues.createComment({
              owner, repo, issue_number: featureIssueNumber,
              body: [
                `## ✅ Task #${taskIssueNumber} Complete`,
                '',
                `Task PR #${taskPRNumber} was auto-merged into the feature branch.`,
                '',
                '_agentic-flow implementation pipeline_',
              ].join('\n'),
            });

      - name: Find next task or dispatch audit
        if: steps.resolve.outputs.skip != 'true' && steps.merge.outputs.merged == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            const owner              = context.repo.owner;
            const repo               = context.repo.repo;
            const featureIssueNumber = Number('${{ steps.resolve.outputs.feature_issue_number }}');
            const featurePRNumber    = '${{ steps.resolve.outputs.feature_pr_number }}';
            const featureBranch      = '${{ steps.resolve.outputs.feature_branch }}';
            const specDirectory      = '${{ steps.resolve.outputs.spec_directory }}';

            let subIssues = [];
            try {
              const { data } = await github.request(
                'GET /repos/{owner}/{repo}/issues/{issue_number}/sub_issues',
                { owner, repo, issue_number: featureIssueNumber }
              );
              subIssues = data || [];
            } catch (e) {
              core.setFailed(`Could not fetch sub-issues: ${e.message}`);
              return;
            }

            const openImplTasks = subIssues.filter(si =>
              si.labels?.some(l => l.name === 'agentic-flow-task') &&
              !si.labels?.some(l => l.name === 'agentic-flow-audit') &&
              si.state === 'open'
            );

            if (openImplTasks.length > 0) {
              // Build dependency map for remaining tasks
              const depMap = new Map();
              for (const task of openImplTasks) {
                const deps = new Set();
                try {
                  const { data: detail } = await github.rest.issues.get({ owner, repo, issue_number: task.number });
                  const body = detail.body || '';
                  const match = body.match(/\|\s*\*\*Depends on\*\*\s*\|\s*([^|\n]+)\|/);
                  if (match) {
                    for (const ref of match[1].matchAll(/#(\d+)/g)) deps.add(Number(ref[1]));
                  }
                } catch (e) {
                  core.warning(`Could not fetch issue #${task.number}: ${e.message}`);
                }
                depMap.set(task.number, deps);
              }

              const closedNumbers = new Set(
                subIssues.filter(si =>
                  si.labels?.some(l => l.name === 'agentic-flow-task') &&
                  !si.labels?.some(l => l.name === 'agentic-flow-audit') &&
                  si.state === 'closed'
                ).map(si => si.number)
              );

              const readyTask = openImplTasks.find(task =>
                [...(depMap.get(task.number) || new Set())].every(dep => closedNumbers.has(dep))
              );

              if (readyTask) {
                core.info(`Next task: #${readyTask.number}. Dispatching implement-dispatch.`);
                await github.rest.actions.createWorkflowDispatch({
                  owner, repo,
                  workflow_id: 'implement-dispatch.yml',
                  ref: 'main',
                  inputs: {
                    feature_issue_number: String(featureIssueNumber),
                    feature_pr_number:    featurePRNumber,
                    feature_branch:       featureBranch,
                    task_issue_number:    String(readyTask.number),
                    spec_directory:       specDirectory,
                  },
                });
              } else {
                core.warning('Open implementation tasks exist but none are ready (dependency cycle or unresolved deps). Halting dispatch.');
              }
              return;
            }

            // All implementation tasks done — transition to audit or done
            core.info('All implementation tasks complete.');

            const openAuditTasks = subIssues.filter(si =>
              si.labels?.some(l => l.name === 'agentic-flow-audit') && si.state === 'open'
            );

            if (openAuditTasks.length > 0) {
              core.info(`Dispatching audit for first open audit task #${openAuditTasks[0].number}.`);
              await github.rest.actions.createWorkflowDispatch({
                owner, repo,
                workflow_id: 'audit-dispatch.yml',
                ref: 'main',
                inputs: {
                  feature_issue_number:    String(featureIssueNumber),
                  feature_pr_number:       featurePRNumber,
                  feature_branch:          featureBranch,
                  audit_task_issue_number: String(openAuditTasks[0].number),
                  spec_directory:          specDirectory,
                  first_audit:             'true',
                },
              });
            } else {
              // No audit tasks — mark feature PR ready for human merge
              core.info('No audit tasks. Converting feature PR from draft and marking implementation complete.');
              await github.rest.pulls.update({
                owner, repo, pull_number: Number(featurePRNumber), draft: false,
              });
              await github.rest.issues.addLabels({
                owner, repo, issue_number: featureIssueNumber, labels: ['implementation-complete'],
              });
              await github.rest.issues.createComment({
                owner, repo, issue_number: featureIssueNumber,
                body: [
                  '## 🎉 All Tasks Implemented',
                  '',
                  'All implementation tasks have been auto-merged into the feature branch. No audit tasks were defined.',
                  '',
                  `**Feature PR #${featurePRNumber}** is now ready for human review and merge.`,
                  '',
                  '_agentic-flow implementation pipeline_',
                ].join('\n'),
              });
              await github.rest.issues.createComment({
                owner, repo, issue_number: Number(featurePRNumber),
                body: [
                  '## 🎉 Ready for Human Review',
                  '',
                  'All implementation tasks have been auto-merged. This PR is ready for human review and merge to `main`.',
                  '',
                  '_agentic-flow implementation pipeline_',
                ].join('\n'),
              });
            }
